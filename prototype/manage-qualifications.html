      `;
      items.forEach(({ label, fn, danger }) => {
        const item = document.createElement('div');
        item.textContent = label;
        item.style.cssText = `padding:12px 20px;cursor:pointer;${danger ? 'color:var(--lumo-error-color,#d0021b);' : ''}`;
        item.onmouseover = () => item.style.background = 'var(--lumo-shade-5pct,#f4f5f7)';
        item.onmouseout  = () => item.style.background = '';
        item.onclick     = () => { menu.remove(); fn(); };
        menu.appendChild(item);
      });
      document.body.appendChild(menu);
      // Clamp so menu stays on screen
      const mr = menu.getBoundingClientRect();
      if (mr.right > window.innerWidth - 8) menu.style.left = (window.innerWidth - mr.width - 8) + 'px';
      if (mr.bottom > window.innerHeight - 8) menu.style.top = (rect.top - mr.height - 4) + 'px';
      setTimeout(() => document.addEventListener('click', () => menu.remove(), { once: true }), 10);
    }

function Checkbox({ checked, indeterminate, onChange, ariaLabel }) {
  const state = indeterminate ? 'pk-indeterminate' : (checked ? 'pk-checked' : '');
  return (
    <span className={"pk-check " + state} role="checkbox" aria-checked={indeterminate ? 'mixed' : checked} aria-label={ariaLabel} tabIndex={0}
      onClick={(e) => { e.stopPropagation(); onChange(!checked); }}
      onKeyDown={(e) => { if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); onChange(!checked); } }}>
      {indeterminate ? Ic.dash : (checked ? Ic.check : null)}
    </span>
  );
}

function Pagination({ page, pageSize, total, onPage, onPageSize }) {
  const totalPages = Math.max(1, Math.ceil(total / pageSize));
  const start = total === 0 ? 0 : (page - 1) * pageSize + 1;
  const end = Math.min(page * pageSize, total);
  return (
    <div className="pk-pagination">
      <div className="pk-pg-group">
        <label htmlFor="pk-pg-size">Page Size:</label>
        <select id="pk-pg-size" value={pageSize} onChange={(e) => onPageSize(parseInt(e.target.value))}>
          {[10, 20, 50, 100].map(n => <option key={n} value={n}>{n}</option>)}
        </select>
      </div>
      <div className="pk-pg-group">
        <span>{start} to <span className="pk-num">{end}</span> of <span className="pk-num">{total.toLocaleString()}</span></span>
      </div>
      <div className="pk-pg-group">
        <button className="pk-pg-btn" disabled={page === 1} onClick={() => onPage(1)} aria-label="First page">{Ic.pgFirst}</button>
        <button className="pk-pg-btn" disabled={page === 1} onClick={() => onPage(page - 1)} aria-label="Previous page">{Ic.chevL}</button>
        <span>Page <span className="pk-num">{page}</span> of <span className="pk-num">{totalPages.toLocaleString()}</span></span>
        <button className="pk-pg-btn" disabled={page === totalPages} onClick={() => onPage(page + 1)} aria-label="Next page">{Ic.chevR}</button>
        <button className="pk-pg-btn" disabled={page === totalPages} onClick={() => onPage(totalPages)} aria-label="Last page">{Ic.pgLast}</button>
      </div>
    </div>
  );
}

function PickerModal({ config, open, initialSelected = [], onClose, onSubmit, fakeTotal }) {
  const [search, setSearch] = useState('');
  const [sideSearch, setSideSearch] = useState('');
  const [sortKey] = useState('name');
  const [sortDir, setSortDir] = useState('asc');
  const [selectedIds, setSelectedIds] = useState(new Set(initialSelected.map(r => r.id)));
  const [selectedMap, setSelectedMap] = useState(() => { const m = new Map(); initialSelected.forEach(r => m.set(r.id, r)); return m; });
  const [page, setPage] = useState(1);
  const [pageSize, setPageSize] = useState(20);
  const [filtersOpen, setFiltersOpen] = useState(false);
  const [sideCollapsed, setSideCollapsed] = useState(false);
  const [detailRow, setDetailRow] = useState(null);
  const [drillActivity, setDrillActivity] = useState(null);
  const showDetails = (row) => setDetailRow(row);

  useEffect(() => {
    if (open) {
      setSearch(''); setSideSearch(''); setPage(1);
      const m = new Map(); initialSelected.forEach(r => m.set(r.id, r));
      setSelectedMap(m); setSelectedIds(new Set(initialSelected.map(r => r.id)));
    }
  }, [open]);

  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose && onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [open, onClose]);

  const filtered = useMemo(() => {
    const q = search.trim().toLowerCase();
    let rows = config.items;
    if (q) rows = rows.filter(r => r.name.toLowerCase().includes(q));
    rows = [...rows].sort((a, b) => {
      const av = (a[sortKey] || '').toString().toLowerCase();
      const bv = (b[sortKey] || '').toString().toLowerCase();
      if (av < bv) return sortDir === 'asc' ? -1 : 1;
      if (av > bv) return sortDir === 'asc' ? 1 : -1;
      return 0;
    });
    return rows;
  }, [search, sortKey, sortDir, config]);

  const totalToShow = (search ? filtered.length : (fakeTotal || filtered.length));
  const pageRows = useMemo(() => { const start = (page - 1) * pageSize; return filtered.slice(start, start + pageSize); }, [filtered, page, pageSize]);
  const allOnPageSelected = pageRows.length > 0 && pageRows.every(r => selectedIds.has(r.id));
  const someOnPageSelected = pageRows.some(r => selectedIds.has(r.id)) && !allOnPageSelected;

  const togglePageAll = () => {
    const next = new Set(selectedIds); const nextMap = new Map(selectedMap);
    if (allOnPageSelected) { pageRows.forEach(r => { next.delete(r.id); nextMap.delete(r.id); }); }
    else { pageRows.forEach(r => { next.add(r.id); nextMap.set(r.id, r); }); }
    setSelectedIds(next); setSelectedMap(nextMap);
  };

  const toggleRow = (row) => {
    const next = new Set(selectedIds); const nextMap = new Map(selectedMap);
    if (next.has(row.id)) { next.delete(row.id); nextMap.delete(row.id); }
    else { next.add(row.id); nextMap.set(row.id, row); }
    setSelectedIds(next); setSelectedMap(nextMap);
  };

  const removeSelected = (row) => {
    const next = new Set(selectedIds); next.delete(row.id);
    const nextMap = new Map(selectedMap); nextMap.delete(row.id);
    setSelectedIds(next); setSelectedMap(nextMap);
  };

  const selectedRows = useMemo(() => Array.from(selectedMap.values()), [selectedMap]);
  const filteredSelected = useMemo(() => {
    const q = sideSearch.trim().toLowerCase();
    if (!q) return selectedRows;
    return selectedRows.filter(r => r.name.toLowerCase().includes(q));
  }, [sideSearch, selectedRows]);

  if (!open) return null;

  const addLabel = config.addLabel
    ? config.addLabel(selectedRows.length)
    : `Add ${selectedRows.length} ${selectedRows.length === 1 ? config.singular : config.plural}`;

  return (
    <div className="pk-scrim" role="dialog" aria-modal="true" aria-labelledby="pk-title" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose && onClose(); }}>
      <div className={"pk-modal " + (sideCollapsed ? 'pk-collapsed' : '')}>
        <div className="pk-main">
          <div className="pk-header">
            <h1 id="pk-title">{config.title}</h1>
            <p className="pk-subtitle">{config.subtitle}</p>
          </div>
          <label htmlFor="pk-search" className="pk-search-label">Search</label>
          <div className="pk-search">
            <span className="pk-ic">{Ic.search}</span>
            <input id="pk-search" value={search} placeholder={"Search " + config.plural.toLowerCase() + " by name..."} onChange={(e) => { setSearch(e.target.value); setPage(1); }} />
          </div>
          <div className="pk-filter-row">
            <button className="pk-filter-toggle" aria-label="Toggle filters" aria-expanded={filtersOpen} onClick={() => setFiltersOpen(v => !v)}>
              {filtersOpen ? Ic.chevronUp : Ic.chevronDown}
            </button>
            <span className="pk-chip">{Ic.globe}{config.filterChip}</span>
          </div>
          {filtersOpen && (
            <div className="pk-filter-extras">
              <label>Status:</label>
              <select defaultValue="all"><option value="all">All</option><option>Active</option><option>Archived</option></select>
              <label>Category:</label>
              <select defaultValue="all"><option value="all">All Categories</option><option>Safety</option><option>Compliance</option><option>Operations</option></select>
              <label>Tag:</label>
              <select defaultValue="all"><option value="all">All Tags</option><option>Required</option><option>Recommended</option></select>
            </div>
          )}
          <div className="pk-table-wrap">
            <table className="pk-table">
              <thead>
                <tr>
                  <th style={{ width: 40, paddingRight: 0 }}>
                    <Checkbox checked={allOnPageSelected} indeterminate={someOnPageSelected} onChange={togglePageAll} ariaLabel="Select all on page" />
                  </th>
                  {config.columns.map((col) => (
                    <th key={col.key}
                      className={[col.divider ? 'pk-col-divider' : '', col.sortable ? 'pk-sortable' : '', col.key === sortKey ? 'pk-sorted' : '', col.key === sortKey && sortDir === 'desc' ? 'pk-sorted-desc' : ''].join(' ').trim()}
                      onClick={() => col.sortable && setSortDir(d => d === 'asc' ? 'desc' : 'asc')}>
                      {col.label}{col.sortable && <span className="pk-sort-ic">{Ic.sortUp}</span>}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {pageRows.length === 0 && <tr><td colSpan={config.columns.length + 1} style={{ textAlign: 'center', padding: 40, color: 'var(--lumo-tertiary-text-color)' }}>No matches.</td></tr>}
                {pageRows.map(row => {
                  const isSel = selectedIds.has(row.id);
                  return (
                    <tr key={row.id} className={isSel ? 'pk-selected' : ''} onClick={() => toggleRow(row)} style={{ cursor: 'pointer' }}>
                      <td style={{ paddingRight: 0 }}><Checkbox checked={isSel} onChange={() => toggleRow(row)} ariaLabel={"Select " + row.name} /></td>
                      {config.columns.map(col => (
                        <td key={col.key} className={col.divider ? 'pk-col-divider' : ''}>
                          <Cell col={col} row={row} config={config} onShowDetails={showDetails} />
                        </td>
                      ))}
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
          <Pagination page={page} pageSize={pageSize} total={totalToShow} onPage={setPage} onPageSize={(n) => { setPageSize(n); setPage(1); }} />
        </div>
        <aside className="pk-side" aria-hidden={sideCollapsed}>
          <div className="pk-side-header">
            <h2>Selected {config.plural}</h2>
            <button className="pk-collapse-btn" aria-label="Collapse selected panel" onClick={() => setSideCollapsed(true)}>{Ic.doubleChevR}</button>
            <span className="pk-count">{selectedRows.length}</span>
          </div>
          <div className="pk-search" style={{ marginBottom: 16 }}>
            <span className="pk-ic">{Ic.search}</span>
            <input value={sideSearch} placeholder="Search" onChange={(e) => setSideSearch(e.target.value)} style={{ height: 40 }} />
          </div>
          <div className="pk-side-list">
            {selectedRows.length === 0 && (
              <div className="pk-side-empty">{Ic.inbox}<div className="pk-empty-title">Nothing selected yet</div><div className="pk-empty-sub">Tick items in the list to add them here.</div></div>
            )}
            {selectedRows.length > 0 && filteredSelected.length === 0 && (
              <div className="pk-side-empty"><div className="pk-empty-title">No matches</div><div className="pk-empty-sub">Try a different search term.</div></div>
            )}
            {filteredSelected.map(row => <SelectedCard key={row.id} row={row} config={config} onRemove={removeSelected} onShowDetails={showDetails} />)}
          </div>
        </aside>
        {sideCollapsed && (
          <button className="pk-reopen" style={{ position: 'absolute', right: 0, top: '50%', transform: 'translateY(-50%)' }} onClick={() => setSideCollapsed(false)}>
            {Ic.doubleChevL}<span>{selectedRows.length} Selected</span>
          </button>
        )}
        <div className="pk-footer">
          <button className="pk-btn pk-btn-secondary" onClick={onClose}>Cancel</button>
          <button className="pk-btn pk-btn-primary" disabled={selectedRows.length === 0} onClick={() => onSubmit && onSubmit(selectedRows)}>{addLabel}</button>
        </div>
      </div>
      <DetailModal row={detailRow} config={config} onClose={() => setDetailRow(null)} onDrillToActivity={(a) => setDrillActivity(a)} />
      <DetailModal row={drillActivity} config={window.PICKER_CONFIGS.activities} onClose={() => setDrillActivity(null)} />
    </div>
  );
}

function DetailModal({ row, config, onClose, onDrillToActivity }) {
  useEffect(() => {
    if (!row) return;
    const onKey = (e) => { if (e.key === 'Escape') { e.stopPropagation(); onClose && onClose(); } };
    window.addEventListener('keydown', onKey, true);
    return () => window.removeEventListener('keydown', onKey, true);
  }, [row, onClose]);
  if (!row) return null;
  const detail = (config.detail ? config.detail(row) : null) || {};
  const kind = detail.kind || 'single';
  return (
    <div className="pk-dscrim" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose && onClose(); }}>
      <div className={"pk-detail " + (kind === 'single' ? 'pk-detail-single' : 'pk-detail-list')} role="dialog" aria-modal="true" aria-labelledby="pk-detail-title">
        <button className="pk-detail-close" aria-label="Close" onClick={onClose}>{Ic.close}</button>
        {kind === 'single'  && <SingleDetailBody detail={detail} row={row} config={config} />}
        {kind === 'list'    && <ListDetailBody   detail={detail} onDrillToActivity={onDrillToActivity} />}
        {kind === 'groups'  && <GroupsDetailBody detail={detail} onDrillToActivity={onDrillToActivity} />}
      </div>
    </div>
  );
}

function SingleDetailBody({ detail, row, config }) {
  const title = detail.title || row.name;
  const meta  = detail.meta  || (config.cardMeta ? config.cardMeta(row).map(m => ({ icon: null, label: m.value })) : []);
  const description = detail.description || 'No description available for this item.';
  return (
    <div className="pk-detail-body">
      <h1 id="pk-detail-title" className="pk-detail-title">{title}</h1>
      <DetailHero hero={detail.hero} title={title} />
      {meta.length > 0 && (
        <div className="pk-detail-meta">
          {meta.map((m, i) => <span key={i} className="pk-detail-meta-item">{m.icon && <span className="pk-detail-meta-ic">{Ic[m.icon] || null}</span>}{m.label}</span>)}
        </div>
      )}
      <h2 className="pk-detail-section">Description</h2>
      <p className="pk-detail-desc">{description}</p>
      {detail.sections && detail.sections.map((s, i) => (
        <div key={i}>
          <h2 className="pk-detail-section">{s.title}</h2>
          {typeof s.body === 'string' ? <p className="pk-detail-desc">{s.body}</p> : s.body}
        </div>
      ))}
    </div>
  );
}

function ActivityRowCard({ activity, onShowDetails }) {
  const iconForType = activity.type === 'Skill Assessment' ? 'tasklist' : activity.type === 'Document Review' ? 'doc' : activity.type === 'Live Session' ? 'user' : activity.type === 'Drill' ? 'shield' : 'monitor';
  return (
    <div className="pk-arow">
      <div className="pk-arow-body">
        <h4 className="pk-arow-title">{activity.name}</h4>
        <p className="pk-arow-desc">{activity.description}</p>
        <div className="pk-arow-meta">
          <span className="pk-arow-meta-item"><span className="pk-detail-meta-ic">{Ic[iconForType] || Ic.monitor}</span>{activity.type}</span>
          <span className="pk-arow-meta-item"><span className="pk-detail-meta-ic">{Ic.clock}</span>{activity.duration}</span>
        </div>
      </div>
      <button className="pk-btn-outline pk-arow-btn" onClick={() => onShowDetails && onShowDetails(activity)}>View Details</button>
    </div>
  );
}

function ListDetailBody({ detail, onDrillToActivity }) {
  const [q, setQ] = useState('');
  const filtered = useMemo(() => {
    const needle = q.trim().toLowerCase();
    if (!needle) return detail.activities;
    return detail.activities.filter(a => a.name.toLowerCase().includes(needle) || (a.description || '').toLowerCase().includes(needle));
  }, [q, detail.activities]);
  return (
    <div className="pk-detail-body pk-detail-list-body">
      <h1 id="pk-detail-title" className="pk-detail-title">{detail.title}</h1>
      <label className="pk-search-label" htmlFor="pk-detail-search">Search</label>
      <div className="pk-search" style={{ marginBottom: 8 }}>
        <span className="pk-ic">{Ic.search}</span>
        <input id="pk-detail-search" value={q} onChange={(e) => setQ(e.target.value)} placeholder="" />
      </div>
      <p className="pk-detail-sub">{detail.subtitle || `Showing ${filtered.length} total activities`}</p>
      <div className="pk-arow-list">
        {filtered.map((a, i) => <ActivityRowCard key={a.id + '-' + i} activity={a} onShowDetails={onDrillToActivity} />)}
        {filtered.length === 0 && <div className="pk-side-empty"><div className="pk-empty-title">No matches</div></div>}
      </div>
    </div>
  );
}

function GroupsDetailBody({ detail, onDrillToActivity }) {
  const [q, setQ] = useState('');
  const [openIds, setOpenIds] = useState(() => new Set(detail.groups.length ? [detail.groups[Math.min(1, detail.groups.length - 1)].id] : []));
  const toggle = (id) => { const next = new Set(openIds); if (next.has(id)) next.delete(id); else next.add(id); setOpenIds(next); };
  const needle = q.trim().toLowerCase();
  const filteredGroups = useMemo(() => {
    if (!needle) return detail.groups;
    return detail.groups.map(g => ({ ...g, activityList: g.activityList.filter(a => a.name.toLowerCase().includes(needle) || (a.description || '').toLowerCase().includes(needle)) })).filter(g => g.activityList.length > 0 || g.name.toLowerCase().includes(needle));
  }, [needle, detail.groups]);
  const totalShown = filteredGroups.reduce((s, g) => s + g.activityList.length, 0);
  return (
    <div className="pk-detail-body pk-detail-list-body">
      <h1 id="pk-detail-title" className="pk-detail-title">{detail.title}</h1>
      <label className="pk-search-label" htmlFor="pk-detail-search">Search</label>
      <div className="pk-search" style={{ marginBottom: 8 }}>
        <span className="pk-ic">{Ic.search}</span>
        <input id="pk-detail-search" value={q} onChange={(e) => setQ(e.target.value)} placeholder="" />
      </div>
      <p className="pk-detail-sub">{detail.subtitle || `Showing ${totalShown} total activities`}</p>
      <div className="pk-accordion">
        {filteredGroups.map(g => {
          const isOpen = openIds.has(g.id) || !!needle;
          return (
            <section key={g.id} className={"pk-acc " + (isOpen ? 'pk-acc-open' : '')}>
              <button className="pk-acc-head" onClick={() => toggle(g.id)} aria-expanded={isOpen}>
                <h3 className="pk-acc-title">{g.name}</h3>
                <span className="pk-acc-count">{g.activityList.length} activities</span>
                <span className="pk-acc-chev">{isOpen ? Ic.chevronUp : Ic.chevronDown}</span>
              </button>
              {isOpen && <div className="pk-acc-body">{g.activityList.map((a, i) => <ActivityRowCard key={a.id + '-' + i} activity={a} onShowDetails={onDrillToActivity} />)}</div>}
            </section>
          );
        })}
        {filteredGroups.length === 0 && <div className="pk-side-empty"><div className="pk-empty-title">No matches</div></div>}
      </div>
    </div>
  );
}

function DetailHero({ hero, title }) {
  if (hero && hero.kind === 'image' && hero.src) return <div className="pk-detail-hero" style={{ backgroundImage: `url(${hero.src})` }} />;
  if (hero && hero.kind === 'avatar') {
    return <div className="pk-detail-hero pk-detail-hero-avatar" style={{ background: hero.color }}><span className="pk-detail-hero-initials">{hero.initials}</span></div>;
  }
  const palette = (hero && hero.colors) || ['#1B2B41', '#0271CE'];
  const label   = (hero && hero.label) || title;
  return (
    <div className="pk-detail-hero pk-detail-hero-placeholder" style={{ background: `linear-gradient(135deg, ${palette[0]}, ${palette[1]})` }}>
      <div className="pk-detail-hero-grid" aria-hidden="true"></div>
      <div className="pk-detail-hero-label">{label}</div>
    </div>
  );
}

window.PickerModal = PickerModal;
window._DetailModal = DetailModal;
  </script>

  <script>
    // ── Demo functions (called directly or via postMessage from shell) ────────
    // The shell demo panel drives the manual flow only. AI demo layers will be
    // re-introduced later as additional demo messages.
    function demoLoadSample() {
      document.getElementById('move-modal-scrim')?.remove();
      document.getElementById('unsaved-warning-scrim')?.remove();
      _savedAsNewInSession = [];
      setupBuilder({
        name: 'CNC Machinist',
        description: 'This qualification prepares CNC Machinists with the foundational safety knowledge, regulatory compliance skills, technical machining competencies, and communication abilities required for effective and safe production in a manufacturing environment.',
      }, buildCNCRequirements());
      showScreen('builder');
    }

    function demoReset() {
      ['move-modal-scrim','unsaved-warning-scrim'].forEach(id => document.getElementById(id)?.remove());
      showScreen('manage');
    }

    // Listen for messages from the shell demo panel
    window.addEventListener('message', function(e) {
      if (!e.data || !e.data.type) return;
      if (e.data.type === 'demo:load-sample') demoLoadSample();
      if (e.data.type === 'demo:reset')       demoReset();
    });
  </script>
</body>
</html>
